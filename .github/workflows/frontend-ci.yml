name: Melopra Frontend CI

on:
push:
branches: ["main"]
pull_request:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: client

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: "npm"
      cache-dependency-path: client/package-lock.json

  - name: Debug paths
    run: |
      pwd
      ls -la
      cat package.json

  - name: Install dependencies
    run: npm install

  - name: Verify React Query
    run: npm ls @tanstack/react-query

  - name: Build frontend
    run: npm run build
```

